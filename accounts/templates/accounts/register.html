{% extends 'base_auth.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Crear Cuenta
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Regístrate para acceder al sistema
            </p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Usuario</label>
                    <input type="text" name="username" id="id_username" required 
                           class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                           placeholder="Nombre de usuario">
                </div>
                <div>
                    <label for="id_password1" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" name="password1" id="id_password1" required 
                           class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                           placeholder="Contraseña">
                </div>
                <div>
                    <label for="id_password2" class="block text-sm font-medium text-gray-700">Confirmar Contraseña</label>
                    <input type="password" name="password2" id="id_password2" required 
                           class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                           placeholder="Confirmar contraseña">
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Registrarse
                </button>
            </div>
            
            <div class="text-sm text-center">
                <a href="{% url 'accounts:login' %}" class="font-medium text-blue-600 hover:text-blue-500">
                    ¿Ya tienes cuenta? Inicia Sesión
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
