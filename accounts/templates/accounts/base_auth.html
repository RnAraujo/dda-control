<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Derecho de Autor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-['Inter']">
    {% if messages %}
        {% for message in messages %}
            <div class="fixed top-0 right-0 m-4 z-50 rounded-md {% if message.tags == 'success' %}bg-green-50{% elif message.tags == 'error' %}bg-red-50{% else %}bg-blue-50{% endif %} p-4">
                <div class="flex">
                    <div class="ml-3">
                        <p class="text-sm font-medium {% if message.tags == 'success' %}text-green-800{% elif message.tags == 'error' %}text-red-800{% else %}text-blue-800{% endif %}">
                            {{ message }}
                        </p>
                    </div>
                </div>
            </div>
        {% endfor %}
    {% endif %}
    
    {% block content %}
    {% endblock %}
</body>
</html>
