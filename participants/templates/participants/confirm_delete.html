{% extends 'base.html' %}

{% block content %}
<div class="bg-white shadow rounded-lg max-w-md mx-auto">
    <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
        <h2 class="text-lg font-medium text-gray-900">Confirmar Eliminación</h2>
    </div>
    
    <div class="p-6">
        <p class="text-gray-700">¿Estás seguro de que deseas eliminar al participante <strong>{{ participant.full_name }}</strong>?</p>
        <p class="text-sm text-red-600 mt-2">Esta acción no se puede deshacer.</p>
        
        <form method="POST" class="mt-6 flex justify-end space-x-3">
            {% csrf_token %}
            <a href="{% url 'participants:list' %}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300">
                Cancelar
            </a>
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">
                Eliminar
            </button>
        </form>
    </div>
</div>
{% endblock %}
